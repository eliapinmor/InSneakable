<div class="relative">
  <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

  <input
    type="text"
    placeholder="Nombre o marca..."
    [ngModel]="searchQuery()"
    (ngModelChange)="onChange($event)"
    class="w-full rounded-lg border border-gray-300 pl-10 pr-9 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black transition-colors"
  />

  @if (searchQuery()) {
    <button
      (click)="onClear()"
      type="button"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 transition-colors"
    >
      ✕
    </button>
  }
</div>
