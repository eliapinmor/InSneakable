<div class="flex flex-col gap-6">
    <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Categoría</label>
        <div class="flex flex-col gap-1">
            <label class="flex items-center gap-2 cursor-pointer text-sm py-1">
                <input type="radio" name="category" value="" [ngModel]="filters().selectedCategory"
                    (ngModelChange)="onCategoryChange($event)" class="accent-black" />
                Todas
            </label>
            @for (cat of categories(); track cat.id) {
            <label class="flex items-center gap-2 cursor-pointer text-sm py-1">
                <input type="radio" name="category" [value]="cat.id" [ngModel]="filters().selectedCategory"
                    (ngModelChange)="onCategoryChange($event)" class="accent-black" />
                {{ cat.name }}
            </label>
            }
        </div>
    </div>
</div>
