<div class="p-8">
  <h1 class="text-3xl font-bold mb-6">Gestión de Pedidos (Admin)</h1>

  <div class="overflow-x-auto bg-white rounded-xl shadow-md border">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-100 text-gray-600 uppercase text-xs">
          <th class="p-4 border-b">ID Pedido / Fecha</th>
          <th class="p-4 border-b">Usuario</th>
          <th class="p-4 border-b">Productos</th>
          <th class="p-4 border-b">Total</th>
          <th class="p-4 border-b">Estado</th>
        </tr>
      </thead>
      <tbody>
        @for (order of orders(); track order.id) {
          <app-order-row
            [order]="order"
            [statusOptions]="statusOptions"
            (statusChange)="changeStatus($event.orderId, $event.status)"
          />
        } @empty {
          <tr>
            <td colspan="5" class="p-10 text-center text-gray-500 italic">
              No hay pedidos en el sistema.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
