<td class="p-5 font-mono text-xs font-bold text-gray-900">
  #{{ order().id.split('-')[0].toUpperCase() }}
  <div class="text-[10px] text-gray-400 font-sans font-normal">{{ order().created_at | date:'shortDate' }}</div>
</td>

<td class="p-5 text-sm text-gray-500">
  ...{{ order().user_id.slice(-6) }}
</td>

<td class="p-5">
  <button
    (click)="onToggle()"
    class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold hover:bg-gray-50 transition-all shadow-sm"
  >
    <i class="fa-solid fa-chevron-right transition-transform duration-200" 
       [style.transform]="order().expanded ? 'rotate(90deg)' : 'none'"></i>
    {{ order().order_items?.length }} productos
  </button>
</td>

<td class="p-5 font-black text-gray-900">
  {{ order().total_amount | number:'1.2-2' }}€
</td>

<td class="p-5 text-right">
  <select
    [ngModel]="order().status"
    (ngModelChange)="onStatusChange(order().id, $event)"
    class="appearance-none text-[10px] uppercase tracking-wider font-black px-4 py-2 rounded-full border-2 cursor-pointer outline-none transition-all"
    [ngClass]="{
      'bg-yellow-50 border-yellow-200 text-yellow-700': order().status === 'pending',
      'bg-blue-50 border-blue-200 text-blue-700': order().status === 'confirmed',
      'bg-purple-50 border-purple-200 text-purple-700': order().status === 'shipped',
      'bg-green-50 border-green-200 text-green-700': order().status === 'delivered',
      'bg-red-50 border-red-200 text-red-700': order().status === 'cancelled'
    }"
  >
    @for (status of statusOptions(); track status) {
      <option [value]="status">{{ status }}</option>
    }
  </select>
</td>
