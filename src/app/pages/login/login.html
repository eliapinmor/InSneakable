<div class="flex flex-col items-start gap-6 m-auto mt-12 w-1/4">
  <h1 class="text-2xl font-bold">Bienvenido de nuevo</h1>
  <form [formGroup]="form" (ngSubmit)="onSubmit()"
    class="flex flex-col gap-4 w-full border border-gray-300 rounded-md p-6">
    <div>
      <label class="text-sm font-medium text-gray-700">Correo electrónico</label>
      <input type="email" placeholder="Correo electrónico" formControlName="email"
        class="w-full rounded-md border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700">Contraseña</label>

      <input type="password" placeholder="Contraseña" formControlName="password"
        class="w-full rounded-md border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <button type="submit" class="w-full rounded-md bg-black text-white px-4 py-2 hover:bg-black/50 transition-colors">
      Iniciar sesión
    </button>
  </form>
  <p class="text-sm text-gray-500 text-center">
    ¿No tienes una cuenta?
    <a routerLink="/register" class="text-blue-500 hover:underline">Regístrate aquí</a>
  </p>
</div>
